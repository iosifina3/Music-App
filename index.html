<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Moonside</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0C12">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
<style>
/* ---------- Moonside · liquid glass tokens ---------- */
:root{
  --night:#0A0C12;
  --moon:#9BA8FF;
  --moon-soft:rgba(155,168,255,.28);
  --text:#F4F3EF;
  --text-dim:rgba(235,236,245,.56);
  --danger:#FF8A96;
  --glass:rgba(255,255,255,.075);
  --glass-strong:rgba(255,255,255,.12);
  --glass-edge:rgba(255,255,255,.16);
  --spec:inset 0 1px 0 rgba(255,255,255,.22);
  --blur:blur(26px) saturate(170%);
  --radius:18px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--night);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none;-webkit-user-select:none;user-select:none;
}
body::before,body::after{content:"";position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(70px)}
body::before{width:70vmax;height:70vmax;top:-30vmax;left:-20vmax;background:radial-gradient(circle,rgba(120,134,255,.20),transparent 65%)}
body::after{width:60vmax;height:60vmax;bottom:-25vmax;right:-20vmax;background:radial-gradient(circle,rgba(94,214,214,.12),transparent 65%)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea,select{font:inherit;color:var(--text)}
::placeholder{color:var(--text-dim)}
svg{display:block}

.glass{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);box-shadow:var(--spec),0 10px 30px rgba(0,0,0,.35)}

#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(var(--safe-top) + 12px) 16px 190px}
@media (min-width:700px){ main{max-width:640px;margin:0 auto;width:100%} }

h1.wordmark{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:6px 0 14px}
h1.wordmark .dot{color:var(--moon)}
.subhead{color:var(--text-dim);font-size:14px;margin:-8px 0 16px}

.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.btn{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);box-shadow:var(--spec);
  border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;color:var(--text);
  display:inline-flex;align-items:center}
.btn.primary{background:linear-gradient(180deg,rgba(155,168,255,.55),rgba(155,168,255,.35));border-color:rgba(155,168,255,.6);color:#fff}
.btn.danger{color:var(--danger)}
.btn.on{color:var(--moon);border-color:var(--moon-soft)}
.btn:active{transform:scale(.97)}
.btn .ic{display:inline-flex;width:15px;height:15px;margin-right:6px}
.btn .ic svg{width:15px;height:15px}
.sortsel{appearance:none;-webkit-appearance:none;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);box-shadow:var(--spec);border-radius:999px;padding:9px 14px;font-size:14px;font-weight:600;outline:none}
.sortsel option{color:#111}

.icon-btn{padding:8px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex:none}
.icon-btn svg{width:18px;height:18px}
.icon-btn.on{color:var(--moon)}

.search{width:100%;border-radius:14px;padding:11px 15px;margin-bottom:14px;outline:none;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);box-shadow:var(--spec)}
.search:focus{border-color:var(--moon-soft)}

.row{display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:14px}
.row:active{background:var(--glass)}
.row .art{width:52px;height:52px;border-radius:12px;flex:none;object-fit:cover;
  background:var(--glass-strong);border:1px solid var(--glass-edge);
  display:flex;align-items:center;justify-content:center;color:var(--moon);font-size:20px;overflow:hidden}
.row .meta{flex:1;min-width:0}
.row .t{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .s{color:var(--text-dim);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.row.playing .t{color:var(--moon)}
.row .more{padding:10px;color:var(--text-dim);flex:none}
.row .more svg{width:18px;height:18px}
.chk{display:flex;align-items:center;justify-content:center;flex:none;color:var(--text-dim)}
.chk svg{width:22px;height:22px}

.empty{text-align:center;color:var(--text-dim);padding:56px 24px;line-height:1.65;font-size:15px}
.empty .big{font-size:40px;display:block;margin-bottom:12px}

.pl-card{display:flex;align-items:center;gap:10px;border-radius:var(--radius);padding:14px;margin-bottom:10px}
.pl-card .t{font-weight:700}
.pl-card .s{color:var(--text-dim);font-size:13px;margin-top:2px}
.reorder-arrows{display:flex;flex-direction:column;gap:2px;flex:none}
.reorder-arrows button{padding:3px;color:var(--text-dim)}
.reorder-arrows button svg{width:15px;height:15px}

.folder-head{display:flex;align-items:center;gap:8px;padding:12px 8px;border-radius:12px;margin-bottom:2px}
.folder-head:active{background:var(--glass)}
.chev svg{width:15px;height:15px;transition:transform .2s}
.chev.open svg{transform:rotate(90deg)}
.fico svg{width:17px;height:17px;color:var(--moon)}
.folder-head .t{font-weight:700;flex:1}
.folder-head .s{color:var(--text-dim);font-size:13px;margin-right:2px}

#dock{position:fixed;left:12px;right:12px;bottom:calc(var(--safe-bottom) + 10px);z-index:20;
  display:flex;flex-direction:column;gap:8px;max-width:640px;margin:0 auto}
#mini{display:none;align-items:center;gap:12px;padding:8px 12px;border-radius:22px}
#mini.show{display:flex}
#mini img,#mini .noart{width:40px;height:40px;border-radius:10px;object-fit:cover;flex:none;
  background:var(--glass-strong);display:flex;align-items:center;justify-content:center;color:var(--moon)}
#mini .meta{flex:1;min-width:0}
#mini .t{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mini .s{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mini button{padding:8px}
#mini button svg{width:19px;height:19px}
#tabs{display:flex;border-radius:26px;overflow:hidden}
#tabs button{flex:1;padding:11px 0 9px;color:var(--text-dim);font-size:11px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px}
#tabs button .ico svg{width:19px;height:19px;margin:0 auto}
#tabs button.on{color:var(--moon)}

#now{position:fixed;inset:0;z-index:40;background:rgba(10,12,18,.72);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  transform:translateY(100%);transition:transform .32s cubic-bezier(.3,.9,.3,1);
  display:flex;flex-direction:column;padding:calc(var(--safe-top) + 10px) 22px calc(var(--safe-bottom) + 18px);overflow:hidden}
#now.open{transform:translateY(0)}
#now .glow{position:absolute;top:-20%;left:50%;width:130%;aspect-ratio:1;transform:translateX(-50%);
  background:radial-gradient(circle,rgba(155,168,255,.20) 0%,transparent 60%);pointer-events:none;filter:blur(24px)}
#now header{display:flex;justify-content:space-between;align-items:center;position:relative}
#now header button{font-size:15px;color:var(--text-dim);padding:8px;font-weight:600}
#np-body{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}
#np-art-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:12px 0}
#np-art,#np-noart{width:min(78vw,340px);aspect-ratio:1;border-radius:24px;object-fit:cover;
  border:1px solid var(--glass-edge);box-shadow:var(--spec),0 24px 60px rgba(0,0,0,.55)}
#np-noart{background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--moon)}
#np-title{font-size:21px;font-weight:800;letter-spacing:-.01em;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#np-artist{color:var(--moon);text-align:center;font-size:15px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#seek-wrap{position:relative}
#seek{width:100%;margin:18px 0 2px;-webkit-appearance:none;background:transparent;height:24px;position:relative;z-index:1}
#seek::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:var(--glass-strong)}
#seek::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);margin-top:-5.5px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#loop-range{position:absolute;top:18px;left:0;width:0;height:5px;margin-top:0;border-radius:3px;background:rgba(155,168,255,.55);pointer-events:none;display:none}
#loop-range.show{display:block}
.times{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums}
.controls{display:flex;align-items:center;justify-content:center;gap:26px;margin:14px 0 4px}
.controls button svg{width:25px;height:25px}
.controls .play{width:72px;height:72px;border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(230,232,245,.9));color:#0B0D14;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--spec),0 10px 26px rgba(0,0,0,.45)}
.controls .play svg{width:27px;height:27px}
.controls .side{color:var(--text-dim)}
.controls .side svg{width:21px;height:21px}
.controls .side.on{color:var(--moon)}
#np-extra{display:flex;justify-content:center;gap:10px;margin-top:8px;flex-wrap:wrap}
#np-extra button{color:var(--text-dim);font-size:13px;font-weight:600;padding:8px 12px;
  border-radius:999px;background:var(--glass);border:1px solid var(--glass-edge);box-shadow:var(--spec);
  display:inline-flex;align-items:center;gap:6px}
#np-extra button .ic svg{width:16px;height:16px}
#np-extra button.on{color:var(--moon);border-color:var(--moon-soft)}

#lyrics-panel{position:absolute;inset:0;border-radius:22px 22px 0 0;
  background:rgba(12,14,22,.78);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);box-shadow:var(--spec);
  transform:translateY(102%);transition:transform .3s ease;display:flex;flex-direction:column}
#lyrics-panel.open{transform:translateY(0)}
#lyrics-panel .lp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 12px;gap:8px;flex-wrap:wrap}
#lyrics-panel .lp-head .t{font-weight:800;font-size:17px}
#lyrics-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 16px 40px}
.lyr-pair{margin-bottom:22px}
.lyr-line{font-size:22px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
.lyr-trans{font-size:15px;color:var(--moon);margin-top:4px;line-height:1.4;font-weight:500}
.lyr-hint{color:var(--text-dim);font-size:14px;line-height:1.6;padding:20px 4px}
.lyr-pair.synced{cursor:pointer;opacity:.5;transition:opacity .25s}
.lyr-pair.synced.active{opacity:1}
.lyr-pair.synced.active .lyr-line{color:var(--moon)}
.sync-box{padding:26px 8px;text-align:center}
.sync-progress{color:var(--moon);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:18px}
.sync-prev,.sync-next{color:var(--text-dim);font-size:15px;min-height:22px}
.sync-current{font-size:24px;font-weight:800;margin:14px 0 22px;line-height:1.35}
.sync-tap{width:100%;padding:18px;border-radius:18px;font-size:16px;justify-content:center}

.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;
  background:rgba(20,23,34,.82);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-edge);border-bottom:none;box-shadow:var(--spec);
  border-radius:24px 24px 0 0;transform:translateY(105%);transition:transform .28s cubic-bezier(.3,.9,.3,1);
  max-height:88dvh;display:flex;flex-direction:column;padding:10px 18px calc(var(--safe-bottom) + 16px)}
.sheet.open{transform:translateY(0)}
.sheet .grab{width:38px;height:5px;border-radius:3px;background:var(--glass-edge);margin:4px auto 12px}
.sheet .sc{overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet h2{font-size:19px;font-weight:800;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input[type=text],.field textarea{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--glass-edge);border-radius:12px;padding:10px 12px;outline:none}
.field textarea{min-height:110px;resize:vertical;line-height:1.5}
.field input:focus,.field textarea:focus{border-color:var(--moon-soft)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.sheet .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.sheet .actions .btn{flex:1;text-align:center;justify-content:center;min-width:120px}
.art-edit{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.art-edit img,.art-edit .noart{width:84px;height:84px;border-radius:14px;object-fit:cover;
  background:rgba(0,0,0,.28);border:1px solid var(--glass-edge);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--moon)}
.list-pick .row{padding:12px 6px}
.timer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.timer-grid .btn{justify-content:center;padding:14px}
.timer-grid .btn.on{border-color:var(--moon);color:var(--moon)}
.toast{position:fixed;left:50%;bottom:calc(var(--safe-bottom) + 150px);transform:translateX(-50%) translateY(20px);
  background:rgba(30,34,50,.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--moon-soft);box-shadow:var(--spec);color:var(--text);
  padding:10px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:99;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app">
<main id="main"></main>

<div id="dock">
  <div id="mini" class="glass" onclick="openNow()">
    <span id="mini-art-slot"><span class="noart">♪</span></span>
    <div class="meta"><div class="t" id="mini-t">—</div><div class="s" id="mini-s">—</div></div>
    <button id="mini-play" onclick="event.stopPropagation();togglePlay()" aria-label="Play or pause"></button>
    <button id="mini-next" onclick="event.stopPropagation();nextSong()" aria-label="Next song"></button>
  </div>
  <nav id="tabs" class="glass">
    <button id="tab-library" class="on" onclick="showView('library')"><span class="ico" id="ico-tab-library"></span>Library</button>
    <button id="tab-playlists" onclick="showView('playlists')"><span class="ico" id="ico-tab-playlists"></span>Playlists</button>
    <button id="tab-settings" onclick="showView('settings')"><span class="ico" id="ico-tab-settings"></span>Settings</button>
  </nav>
</div>

<section id="now" aria-label="Now playing">
  <div class="glow"></div>
  <header>
    <button onclick="closeNow()">⌄ Close</button>
    <button onclick="openDetailsForCurrent()">Edit ✎</button>
  </header>
  <div id="np-body">
    <div id="np-art-wrap"><span id="np-art-slot"><div id="np-noart">♪</div></span></div>
    <div id="np-title">—</div>
    <div id="np-artist">—</div>
    <div id="seek-wrap">
      <div id="loop-range"></div>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" aria-label="Seek">
    </div>
    <div class="times"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
    <div class="controls">
      <button class="side" id="btn-shuffle" onclick="toggleShuffle()" aria-label="Shuffle"></button>
      <button id="btn-prev" onclick="prevSong()" aria-label="Previous"></button>
      <button class="play" id="btn-play" onclick="togglePlay()" aria-label="Play or pause"></button>
      <button id="btn-next" onclick="nextSong()" aria-label="Next"></button>
      <button class="side" id="btn-repeat" onclick="cycleRepeat()" aria-label="Repeat"></button>
    </div>
    <div id="np-extra">
      <button id="btn-lyrics" onclick="openLyrics()"><span class="ic" id="ic-lyrics"></span><span class="btn-label">Lyrics</span></button>
      <button id="btn-loop" onclick="cycleLoopSection()"><span class="ic" id="ic-loop"></span><span class="btn-label">Loop</span></button>
      <button id="btn-timer" onclick="openTimerSheet()"><span class="ic" id="ic-timer"></span><span class="btn-label">Timer ☾</span></button>
      <button id="btn-queue" onclick="openQueueSheet()"><span class="ic" id="ic-queue"></span><span class="btn-label">Queue</span></button>
      <button id="btn-addplaylist" onclick="openAddToPlaylist(state.currentId)"><span class="ic" id="ic-addplaylist"></span><span class="btn-label">Playlist</span></button>
    </div>
    <div id="lyrics-panel">
      <div class="lp-head">
        <span class="t">Lyrics</span>
        <span>
          <button class="btn" id="btn-trans-toggle" onclick="toggleTranslation()">Show translation</button>
          <button class="btn" onclick="closeLyrics()">Close</button>
        </span>
      </div>
      <div id="lyrics-scroll"></div>
    </div>
  </div>
</section>

<div class="sheet-backdrop" id="backdrop" onclick="closeAllSheets()"></div>

<div class="sheet" id="sheet-details">
  <div class="grab"></div>
  <div class="sc">
    <h2>Song details</h2>
    <div class="art-edit">
      <span id="ed-art-slot"><span class="noart">♪</span></span>
      <div>
        <button class="btn" onclick="document.getElementById('art-input').click()">Choose photo</button>
        <input type="file" id="art-input" accept="image/*" hidden>
        <div style="font-size:12px;color:var(--text-dim);margin-top:8px">Add your own cover for songs<br>that came without one.</div>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label for="ed-title">Title</label><input type="text" id="ed-title"></div>
      <div class="field" style="max-width:90px"><label for="ed-year">Year</label><input type="text" id="ed-year" inputmode="numeric" maxlength="4" placeholder="—"></div>
    </div>
    <div class="field"><label for="ed-artist">Artist</label><input type="text" id="ed-artist"></div>
    <div class="field"><label for="ed-album">Album</label><input type="text" id="ed-album"></div>
    <div class="field">
      <label for="ed-lyrics">Lyrics (one line per line)</label>
      <textarea id="ed-lyrics" placeholder="Paste the song's lyrics here…"></textarea>
    </div>
    <div class="field">
      <label for="ed-trans">Translation (matching lines — English ↔ Spanish or any pair)</label>
      <textarea id="ed-trans" placeholder="Paste the translated lyrics here, line by line, so each line sits under the original…"></textarea>
    </div>
    <div class="actions">
      <button class="btn primary" onclick="saveDetails()">Save</button>
      <button class="btn" onclick="syncFromDetails()">Sync lyrics ⏱</button>
      <button class="btn" onclick="document.getElementById('lrc-input').click()">Import .lrc</button>
      <button class="btn" onclick="playNext(editingId);closeAllSheets();">Play next</button>
      <button class="btn" onclick="addToQueue(editingId);closeAllSheets();">Add to queue</button>
      <button class="btn" onclick="openAddToPlaylist(editingId)">+ Playlist</button>
      <button class="btn danger" onclick="deleteSong()">Delete song</button>
    </div>
  </div>
</div>

<div class="sheet" id="sheet-pick">
  <div class="grab"></div>
  <div class="sc">
    <h2>Add to playlist</h2>
    <div class="list-pick" id="pick-list"></div>
    <div class="actions"><button class="btn" onclick="newPlaylistThenAdd()">＋ New playlist</button></div>
  </div>
</div>

<div class="sheet" id="sheet-folderpick">
  <div class="grab"></div>
  <div class="sc">
    <h2>Move to folder</h2>
    <div class="list-pick" id="folder-pick-list"></div>
    <div class="actions"><button class="btn" onclick="createFolderThenAssign()">＋ New folder</button></div>
  </div>
</div>

<div class="sheet" id="sheet-queue">
  <div class="grab"></div>
  <div class="sc">
    <h2>Up next</h2>
    <div id="queue-list"></div>
  </div>
</div>

<div class="sheet" id="sheet-timer">
  <div class="grab"></div>
  <div class="sc">
    <h2>Sleep timer</h2>
    <div class="timer-grid" id="timer-grid"></div>

};
function ic(name){ return ICO[name] || ""; }

// ---------- tiny IndexedDB wrapper ----------
const DB_NAME = "moonside", DB_VER = 2;
let db;
function openDB(){
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = () => {
      const d = r.result;
      if (!d.objectStoreNames.contains("songs")) d.createObjectStore("songs", { keyPath: "id" });
      if (!d.objectStoreNames.contains("blobs")) d.createObjectStore("blobs", { keyPath: "id" });
      if (!d.objectStoreNames.contains("playlists")) d.createObjectStore("playlists", { keyPath: "id" });
      if (!d.objectStoreNames.contains("folders")) d.createObjectStore("folders", { keyPath: "id" });
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function tx(store, mode, fn){
  return new Promise((res, rej) => {
    const t = db.transaction(store, mode);
    fn(t.objectStore(store));
    t.oncomplete = () => res();
    t.onerror = () => rej(t.error);
  });
}
const putSong = (s) => tx("songs", "readwrite", (st) => st.put(s));
const delSongRec = (id) => tx("songs", "readwrite", (st) => st.delete(id));
const putBlob = (id, blob) => tx("blobs", "readwrite", (st) => st.put({ id, blob }));
const delBlob = (id) => tx("blobs", "readwrite", (st) => st.delete(id));
function getBlob(id){
  return new Promise((res, rej) => {
    const t = db.transaction("blobs").objectStore("blobs").get(id);
    t.onsuccess = () => res(t.result ? t.result.blob : null);
    t.onerror = () => rej(t.error);
  });
}
function getAll(store){
  return new Promise((res, rej) => {
    const t = db.transaction(store).objectStore(store).getAll();
    t.onsuccess = () => res(t.result || []);
    t.onerror = () => rej(t.error);
  });
}
const putPlaylist = (p) => tx("playlists", "readwrite", (st) => st.put(p));
const delPlaylist = (id) => tx("playlists", "readwrite", (st) => st.delete(id));
const putFolder = (f) => tx("folders", "readwrite", (st) => st.put(f));
const delFolder = (id) => tx("folders", "readwrite", (st) => st.delete(id));

// ---------- state ----------
const state = {
  songs: [], playlists: [], folders: [],
  view: "library", openPlaylistId: null,
  queue: [], qIndex: -1, currentId: null,
  shuffle: false, shufflePlayed: new Set(),
  repeat: "off", showTrans: true, search: "",
  librarySort: "title",
  sleep: { minutes: null, endAt: null, afterSong: false },
  loopSection: { a: null, b: null },
  selectMode: false, selectCtx: null, selected: new Set(),
  reorderMode: false, openFolders: new Set()
};
const audio = new Audio();
audio.preload = "auto";
let currentURL = null;
let editingId = null;
let pendingSyncTimes = null;
let pickIds = [];
let folderPickPid = null;
let syncState = null;
const artURLCache = new Map();

// ---------- helpers ----------
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const fmt = (s) => { if (!isFinite(s)) return "0:00"; s = Math.floor(s); return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0"); };
const esc = (t) => (t || "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove("show"), 2200);
}
function artURL(song){
  if (!song || !song.artBlob) return null;
  if (!artURLCache.has(song.id)) artURLCache.set(song.id, URL.createObjectURL(song.artBlob));
  return artURLCache.get(song.id);
}
function songById(id){ return state.songs.find((s) => s.id === id); }
function matchKey(title, artist){ return ((title||"") + "|||" + (artist||"")).toLowerCase().trim().replace(/\s+/g," "); }
function mimeToExt(type){
  if (!type) return "jpg";
  if (type.includes("png")) return "png";
  if (type.includes("webp")) return "webp";
  if (type.includes("gif")) return "gif";
  return "jpg";
}
function sortSongs(list, mode){
  const l = [...list];
  if (mode === "title") l.sort((a,b) => a.title.localeCompare(b.title));
  else if (mode === "artist") l.sort((a,b) => (a.artist+a.title).localeCompare(b.artist+b.title));
  else if (mode === "added") l.sort((a,b) => b.added - a.added);
  return l;
}

// ---------- metadata parsing (ID3v2 for MP3, FLAC blocks) ----------
function parseSynchsafe(b, i){ return (b[i]<<21)|(b[i+1]<<14)|(b[i+2]<<7)|b[i+3]; }
function decodeText(bytes, enc){
  try{
    if (enc === 0) return new TextDecoder("latin1").decode(bytes);
    if (enc === 1) return new TextDecoder("utf-16").decode(bytes);
    if (enc === 2) return new TextDecoder("utf-16be").decode(bytes);
    return new TextDecoder("utf-8").decode(bytes);
  }catch{ return ""; }
}
function parseID3(buf){
  const b = new Uint8Array(buf);
  const out = {};
  if (b.length < 10 || b[0] !== 0x49 || b[1] !== 0x44 || b[2] !== 0x33) return out;
  const ver = b[3];
  const tagSize = parseSynchsafe(b, 6) + 10;
  let i = 10;
  if (b[5] & 0x40) i += parseSynchsafe(b, 10) + 4;
  while (i + 10 < Math.min(tagSize, b.length)) {
    const idStr = String.fromCharCode(b[i], b[i+1], b[i+2], b[i+3]);
    if (!/^[A-Z0-9]{4}$/.test(idStr)) break;
    const size = ver === 4 ? parseSynchsafe(b, i+4)
      : (b[i+4]<<24)|(b[i+5]<<16)|(b[i+6]<<8)|b[i+7];
    if (size <= 0 || i + 10 + size > b.length) break;
    const body = b.subarray(i + 10, i + 10 + size);
    if (idStr === "TIT2" || idStr === "TPE1" || idStr === "TALB") {
      const txt = decodeText(body.subarray(1), body[0]).replace(/\0+$/,"").trim();
      if (idStr === "TIT2") out.title = txt;
      if (idStr === "TPE1") out.artist = txt;
      if (idStr === "TALB") out.album = txt;
    } else if (idStr === "TYER" || idStr === "TDRC") {
      const txt = decodeText(body.subarray(1), body[0]).replace(/\0+$/,"").trim();
      const m = txt.match(/\d{4}/);
      if (m) out.year = m[0];
    } else if (idStr === "APIC" && !out.art) {
      const enc = body[0];
      let p = 1;
      while (p < body.length && body[p] !== 0) p++;
      const mime = new TextDecoder("latin1").decode(body.subarray(1, p)) || "image/jpeg";
      p += 1; p += 1;
      if (enc === 1 || enc === 2) {
        while (p + 1 < body.length && !(body[p] === 0 && body[p+1] === 0)) p += 2;
        p += 2;
      } else {
        while (p < body.length && body[p] !== 0) p++;
        p += 1;
      }
      if (p < body.length) out.art = new Blob([body.subarray(p)], { type: mime });
    }
    i += 10 + size;
  }
  return out;
}
function parseFLAC(buf){
  const b = new Uint8Array(buf);
  const out = {};
  if (b.length < 8 || String.fromCharCode(b[0],b[1],b[2],b[3]) !== "fLaC") return out;
  let i = 4;
  const u32le = (o) => b[o] | (b[o+1]<<8) | (b[o+2]<<16) | (b[o+3]<<24);
  const u32be = (o) => (b[o]<<24) | (b[o+1]<<16) | (b[o+2]<<8) | b[o+3];
  while (i + 4 <= b.length) {
    const last = b[i] & 0x80, type = b[i] & 0x7f;
    const size = (b[i+1]<<16) | (b[i+2]<<8) | b[i+3];
    const start = i + 4;
    if (start + size > b.length) break;
    if (type === 4) {
      let p = start;
      const vlen = u32le(p); p += 4 + vlen;
      const count = u32le(p); p += 4;
      const td = new TextDecoder("utf-8");
      for (let c = 0; c < count && p + 4 <= start + size; c++) {
        const len = u32le(p); p += 4;
        const kv = td.decode(b.subarray(p, p + len)); p += len;
        const eq = kv.indexOf("=");
        if (eq > 0) {
          const k = kv.slice(0, eq).toUpperCase(), v = kv.slice(eq + 1).trim();
          if (k === "TITLE") out.title = v;
          if (k === "ARTIST") out.artist = v;
          if (k === "ALBUM") out.album = v;
          if ((k === "DATE" || k === "YEAR") && !out.year) { const m = v.match(/\d{4}/); if (m) out.year = m[0]; }
        }
      }
    } else if (type === 6 && !out.art) {
      let p = start + 4;
      const mlen = u32be(p); p += 4;
      const mime = new TextDecoder("latin1").decode(b.subarray(p, p + mlen)) || "image/jpeg";
      p += mlen;
      const dlen = u32be(p); p += 4 + dlen;
      p += 16;
      const plen = u32be(p); p += 4;
      if (p + plen <= start + size) out.art = new Blob([b.subarray(p, p + plen)], { type: mime });
    }
    i = start + size;
    if (last) break;
  }
  return out;
}

// ---------- .lrc parsing (synced lyric files) ----------
function baseName(name){ return name.replace(/\.[^.]+$/,"").toLowerCase().trim(); }
function parseLRC(text){
  const timeTag = /\[(\d{1,3}):(\d{2})(?:[.:](\d{1,3}))?\]/g;
  const entries = [];
  for (const raw of text.split(/\r?\n/)) {
    const tags = [...raw.matchAll(timeTag)];
    if (!tags.length) continue; // skip metadata lines like [ar:...], [ti:...]
    const lineText = raw.replace(timeTag, "").trim();
    for (const m of tags) {
      const min = parseInt(m[1], 10), sec = parseInt(m[2], 10);
      const frac = m[3] ? parseInt(m[3].padEnd(3, "0").slice(0, 3), 10) / 1000 : 0;
      entries.push({ time: min * 60 + sec + frac, text: lineText });
    }
  }
  entries.sort((a, b) => a.time - b.time);
  return { lyrics: entries.map((e) => e.text).join("\n"), syncTimes: entries.map((e) => e.time) };
}

// ---------- importing ----------
async function importFiles(files){
  if (!files || !files.length) return;
  const audioFiles = files.filter((f) => !/\.lrc$/i.test(f.name));
  const lrcFiles = files.filter((f) => /\.lrc$/i.test(f.name));
  if (!audioFiles.length && lrcFiles.length) { toast("Select the matching song too, so lyrics can attach to it"); return; }
  const lrcMap = new Map();
  for (const lf of lrcFiles) lrcMap.set(baseName(lf.name), lf);

  toast("Importing " + audioFiles.length + " file" + (audioFiles.length > 1 ? "s" : "") + "…");
  let ok = 0, synced = 0;
  for (const f of audioFiles) {
    try {

      const head = await f.slice(0, 512 * 1024).arrayBuffer();
      let meta = parseID3(head);
      if (!meta.title && !meta.art) { const fl = parseFLAC(head); meta = { ...fl, ...meta, art: meta.art || fl.art, year: meta.year || fl.year }; }
      const nameGuess = f.name.replace(/\.[^.]+$/,"").replace(/^\d+[\s.\-_]+/,"").trim();
      const song = {
        id: uid(),
        title: meta.title || nameGuess || "Untitled",
        artist: meta.artist || "Unknown artist",
        album: meta.album || "",
        year: meta.year || "",
        artBlob: meta.art || null,
        lyrics: "", trans: "", syncTimes: null,
        added: Date.now()
      };
      const lrcFile = lrcMap.get(baseName(f.name));
      if (lrcFile) {
        try {
          const parsed = parseLRC(await lrcFile.text());
          if (parsed.lyrics.trim()) {
            song.lyrics = parsed.lyrics;
            if (parsed.syncTimes.length === parsed.lyrics.split("\n").length) { song.syncTimes = parsed.syncTimes; synced++; }
          }
        } catch (e) { console.warn("lrc parse failed", lrcFile.name, e); }
      }
      await putBlob(song.id, f);
      await putSong(song);
      state.songs.push(song);
      ok++;
    } catch (e) { console.warn("import failed", f.name, e); }
  }
  render();
  let msg = ok + " song" + (ok === 1 ? "" : "s") + " added";
  if (synced) msg += `, ${synced} with synced lyrics from .lrc ✓`;
  toast(msg);
}
document.getElementById("file-input").addEventListener("change", (e) => {
  importFiles([...e.target.files]); e.target.value = "";
});
document.getElementById("lrc-input").addEventListener("change", async (e) => {
  const f = e.target.files[0]; if (!f || !editingId) { e.target.value = ""; return; }
  try {
    const parsed = parseLRC(await f.text());
    if (!parsed.lyrics.trim()) { toast("Couldn't find timed lyrics in that file"); e.target.value = ""; return; }
    document.getElementById("ed-lyrics").value = parsed.lyrics;
    pendingSyncTimes = parsed.syncTimes;
    toast("Lyrics loaded — tap Save to apply");
  } catch (err) { console.error(err); toast("Couldn't read that file"); }
  e.target.value = "";
});

// ---------- playback ----------
async function playSong(id, queue){
  const song = songById(id); if (!song) return;
  if (queue) {
    state.queue = queue; state.qIndex = queue.indexOf(id);
    if (state.shuffle) state.shufflePlayed = new Set([id]);
  } else if (state.shuffle) {
    state.shufflePlayed.add(id);
  }
  state.currentId = id;
  state.loopSection = { a: null, b: null };
  const blob = await getBlob(id);
  if (!blob) { toast("Audio file missing"); return; }
  if (currentURL) URL.revokeObjectURL(currentURL);
  currentURL = URL.createObjectURL(blob);
  audio.src = currentURL;
  try { await audio.play(); } catch (e) { console.warn(e); }
  updateNowUI(); updateMediaSession(); renderMain();
}
function togglePlay(){
  if (!state.currentId) {
    const list = sortSongs(filteredSongs(), state.librarySort);
    if (list[0]) playSong(list[0].id, list.map((s) => s.id));
    return;
  }
  if (audio.paused) audio.play(); else audio.pause();
}
function nextSong(){
  if (!state.queue.length) return;
  if (state.shuffle) {
    let pool = state.queue.filter((id) => !state.shufflePlayed.has(id));
    if (!pool.length) {
      if (state.repeat === "all") { state.shufflePlayed = new Set(); pool = state.queue.slice(); }
      else { audio.pause(); return; }
    }
    const pick = pool[Math.floor(Math.random() * pool.length)];
    state.qIndex = state.queue.indexOf(pick);
    playSong(pick);
    return;
  }
  state.qIndex++;
  if (state.qIndex >= state.queue.length) {
    if (state.repeat === "all") state.qIndex = 0;
    else { state.qIndex = state.queue.length - 1; audio.pause(); return; }
  }
  playSong(state.queue[state.qIndex]);
}
function prevSong(){
  if (audio.currentTime > 4) { audio.currentTime = 0; return; }
  if (!state.queue.length) return;
  state.qIndex = Math.max(0, state.qIndex - 1);
  playSong(state.queue[state.qIndex]);
}
function toggleShuffle(){
  state.shuffle = !state.shuffle;
  if (state.shuffle) state.shufflePlayed = new Set([state.currentId].filter(Boolean));
  updateNowUI();
}
function cycleRepeat(){
  state.repeat = state.repeat === "off" ? "all" : state.repeat === "all" ? "one" : "off";
  updateNowUI();
}
function shufflePlaylist(pid){
  const p = state.playlists.find((x) => x.id === pid);
  if (!p || !p.songIds.length) { toast("This playlist is empty"); return; }
  state.shuffle = true;
  const ids = p.songIds.slice();
  const startId = ids[Math.floor(Math.random() * ids.length)];
  playSong(startId, ids);
}
audio.addEventListener("ended", () => {
  if (state.sleep.afterSong) { clearSleep(); toast("Sleep timer — goodnight ☾"); updateNowUI(); return; }
  if (state.repeat === "one") { audio.currentTime = 0; audio.play(); } else nextSong();
});
audio.addEventListener("play", updatePlayIcons);
audio.addEventListener("pause", updatePlayIcons);
audio.addEventListener("loadedmetadata", updateLoopUI);
audio.addEventListener("timeupdate", () => {
  const { a, b } = state.loopSection;
  if (a != null && b != null && audio.currentTime >= b) { audio.currentTime = a; }
  const seek = document.getElementById("seek");
  if (!seek._drag && audio.duration) seek.value = (audio.currentTime / audio.duration) * 100;
  document.getElementById("t-cur").textContent = fmt(audio.currentTime);
  document.getElementById("t-dur").textContent = fmt(audio.duration);
  updateLyricHighlight();
});
const seekEl = document.getElementById("seek");
seekEl.addEventListener("input", () => { seekEl._drag = true; });
seekEl.addEventListener("change", () => {
  if (audio.duration) audio.currentTime = (seekEl.value / 100) * audio.duration;
  seekEl._drag = false;
});
function updateMediaSession(){
  if (!("mediaSession" in navigator)) return;
  const s = songById(state.currentId); if (!s) return;
  const art = artURL(s);
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.title, artist: s.artist, album: s.album,
    artwork: art ? [{ src: art, sizes: "512x512", type: s.artBlob.type || "image/jpeg" }] : []
  });
  navigator.mediaSession.setActionHandler("play", () => audio.play());
  navigator.mediaSession.setActionHandler("pause", () => audio.pause());
  navigator.mediaSession.setActionHandler("previoustrack", prevSong);
  navigator.mediaSession.setActionHandler("nexttrack", nextSong);
}

// ---------- A-B loop section ----------
function cycleLoopSection(){
  if (!state.currentId) return;
  const t = audio.currentTime;
  if (state.loopSection.a == null) {
    state.loopSection.a = t;
    toast("Loop start set — play on, then tap Loop again for the end point");
  } else if (state.loopSection.b == null) {
    if (t <= state.loopSection.a + 0.4) { toast("Play a little further before setting the end point"); return; }
    state.loopSection.b = t;
    toast("Looping " + fmt(state.loopSection.a) + "–" + fmt(state.loopSection.b));
  } else {
    state.loopSection = { a: null, b: null };
    toast("Loop off");
  }
  updateLoopUI();
}
function updateLoopUI(){
  const btn = document.getElementById("btn-loop");
  const label = btn.querySelector(".btn-label");
  const overlay = document.getElementById("loop-range");
  const { a, b } = state.loopSection;
  if (a == null) { label.textContent = "Loop"; btn.classList.remove("on"); overlay.classList.remove("show"); }
  else if (b == null) { label.textContent = "Set end…"; btn.classList.add("on"); overlay.classList.remove("show"); }
  else {
    label.textContent = "Looping " + fmt(a) + "–" + fmt(b);
    btn.classList.add("on");
    if (audio.duration) {
      overlay.style.left = (a / audio.duration * 100) + "%";
      overlay.style.width = ((b - a) / audio.duration * 100) + "%";
      overlay.classList.add("show");
    }
  }
}

// ---------- sleep timer ----------
let sleepTick = null;
function openTimerSheet(){
  renderTimerSheet();
  document.getElementById("backdrop").classList.add("open");
  document.getElementById("sheet-timer").classList.add("open");
}
function renderTimerSheet(){
  const grid = document.getElementById("timer-grid");
  const opts = [
    { label: "15 min", m: 15 }, { label: "30 min", m: 30 },
    { label: "45 min", m: 45 }, { label: "1 hour", m: 60 },
    { label: "End of song", song: true }, { label: "Off", off: true }
  ];
  grid.innerHTML = opts.map((o, i) => {
    const on = o.off ? (!state.sleep.endAt && !state.sleep.afterSong)
      : o.song ? state.sleep.afterSong
      : state.sleep.minutes === o.m && !!state.sleep.endAt;
    return `<button class="btn ${on ? "on" : ""}" onclick="setSleep(${i})">${o.label}</button>`;
  }).join("");
  grid._opts = opts;
}
function setSleep(i){
  const o = document.getElementById("timer-grid")._opts[i];
  clearInterval(sleepTick); sleepTick = null;
  if (o.off) { clearSleep(); toast("Sleep timer off"); }
  else if (o.song) {
    state.sleep = { minutes: null, endAt: null, afterSong: true };
    toast("Pausing after this song ☾");
  } else {
    state.sleep = { minutes: o.m, endAt: Date.now() + o.m * 60000, afterSong: false };
    sleepTick = setInterval(checkSleep, 1000);
    toast("Sleeping in " + o.m + " min ☾");
  }
  closeAllSheets(); updateNowUI();
}
function clearSleep(){
  state.sleep = { minutes: null, endAt: null, afterSong: false };
  clearInterval(sleepTick); sleepTick = null;
  updateNowUI();
}
function checkSleep(){
  if (state.sleep.endAt && Date.now() >= state.sleep.endAt) {
    audio.pause(); clearSleep(); toast("Sleep timer — goodnight ☾");
  } else updateTimerButton();
}
function updateTimerButton(){
  const b = document.getElementById("btn-timer");
  const label = b.querySelector(".btn-label");
  if (state.sleep.endAt) {
    const left = Math.max(0, state.sleep.endAt - Date.now());
    label.textContent = fmt(left / 1000);
    b.classList.add("on");
  } else if (state.sleep.afterSong) {
    label.textContent = "End of song"; b.classList.add("on");
  } else { label.textContent = "Timer ☾"; b.classList.remove("on"); }
}

// ---------- queue ("Up next") ----------
function playNext(id){
  if (!id) return;
  if (!state.currentId) { playSong(id, [id]); toast("Playing now"); return; }
  state.queue.splice(state.qIndex + 1, 0, id);
  toast("Playing next");
}
function addToQueue(id){
  if (!id) return;
  if (!state.currentId) { playSong(id, [id]); toast("Playing now"); return; }
  state.queue.push(id);
  toast("Added to queue");
}
function openQueueSheet(){
  renderQueueList();
  document.getElementById("backdrop").classList.add("open");
  document.getElementById("sheet-queue").classList.add("open");
}
function renderQueueList(){
  const box = document.getElementById("queue-list");
  const current = songById(state.currentId);
  const upcoming = state.queue.slice(state.qIndex + 1)
    .map((id, i) => ({ id, pos: state.qIndex + 1 + i, song: songById(id) }))
    .filter((x) => x.song);
  let html = "";
  if (current) {
    const art = artURL(current);
    html += `<div class="subhead" style="margin-bottom:6px">Now playing</div>
      <div class="row" style="opacity:.85">
        ${art ? `<img class="art" src="${art}" alt="">` : `<span class="art">♪</span>`}
        <div class="meta"><div class="t">${esc(current.title)}</div><div class="s">${esc(current.artist)}</div></div>
      </div>`;
  }
  html += `<div class="subhead" style="margin:14px 0 6px">Next up (${upcoming.length})</div>`;
  html += upcoming.length ? upcoming.map((x) => {
    const art = artURL(x.song);
    return `<div class="row">
      <span onclick="jumpToQueue(${x.pos})" style="display:contents">
        ${art ? `<img class="art" src="${art}" alt="">` : `<span class="art">♪</span>`}
        <div class="meta"><div class="t">${esc(x.song.title)}</div><div class="s">${esc(x.song.artist)}</div></div>
      </span>
      <button class="icon-btn" onclick="event.stopPropagation();removeFromQueue(${x.pos})" aria-label="Remove">${ic("trash")}</button>
    </div>`;
  }).join("") : `<div class="empty" style="padding:20px">Nothing queued yet — use Play next or Add to queue on any song.</div>`;
  box.innerHTML = html;
}
function jumpToQueue(pos){
  state.qIndex = pos;
  playSong(state.queue[pos]);
  closeAllSheets();
}
function removeFromQueue(pos){
  state.queue.splice(pos, 1);
  renderQueueList();
  toast("Removed from queue");
}

// ---------- UI: views ----------
function showView(v){
  state.view = v; state.openPlaylistId = null;
  for (const t of ["library","playlists","settings"])
    document.getElementById("tab-"+t).classList.toggle("on", t === v);
  renderMain();
}
function filteredSongs(){
  const q = state.search.toLowerCase();

}
function songRowHTML(s, ctx){

function rowPlay(id, ctx){

function setLibrarySort(v){ state.librarySort = v; renderMain(); }
async function setPlaylistSort(pid, v){

function sortSelect(current, handler){

// ---------- multi-select (mass add / play next / delete / remove) ----------
function toggleSelectMode(ctx){
  if (state.selectMode && state.selectCtx === ctx) { exitSelectMode(); return; }
  state.selectMode = true; state.selectCtx = ctx; state.selected = new Set();
  renderMain();
}
function exitSelectMode(){
  state.selectMode = false; state.selectCtx = null; state.selected = new Set();
  renderMain();
}
function toggleSelect(id){
  if (state.selected.has(id)) state.selected.delete(id); else state.selected.add(id);
  renderMain();
}
function currentSelectableIds(){
  if (state.selectCtx === "library") return sortSongs(filteredSongs(), state.librarySort).map((s) => s.id);
  const p = state.playlists.find((x) => x.id === state.selectCtx);
  return p ? sortSongs(p.songIds.map(songById).filter(Boolean), p.sort || "custom").map((s) => s.id) : [];
}
function selectAllVisible(){
  const ids = currentSelectableIds();
  const allSel = ids.every((id) => state.selected.has(id));
  if (allSel) ids.forEach((id) => state.selected.delete(id)); else ids.forEach((id) => state.selected.add(id));
  renderMain();
}
async function bulkDelete(){
  const ids = [...state.selected];
  if (!ids.length) { toast("No songs selected"); return; }
  if (!confirm(`Delete ${ids.length} song${ids.length === 1 ? "" : "s"} from Moonside?`)) return;
  for (const id of ids) {
    state.songs = state.songs.filter((s) => s.id !== id);
    for (const p of state.playlists) if (p.songIds.includes(id)) { p.songIds = p.songIds.filter((x) => x !== id); await putPlaylist(p); }
    await delSongRec(id); await delBlob(id);
    if (state.currentId === id) { audio.pause(); state.currentId = null; document.getElementById("mini").classList.remove("show"); closeNow(); }
  }
  toast(`${ids.length} song${ids.length === 1 ? "" : "s"} deleted`);
  exitSelectMode();
}
async function bulkRemoveFromPlaylist(){
  const pid = state.selectCtx;
  const p = state.playlists.find((x) => x.id === pid); if (!p) return;
  const ids = [...state.selected]; if (!ids.length) { toast("No songs selected"); return; }
  p.songIds = p.songIds.filter((id) => !ids.includes(id));
  await putPlaylist(p);
  toast(`${ids.length} removed from ${p.name}`);
  exitSelectMode();
  renderPlaylistDetail();
}
function bulkAddToPlaylist(){
  const ids = [...state.selected]; if (!ids.length) { toast("No songs selected"); return; }
  openAddToPlaylist(ids);
}
function bulkPlayNext(){
  const ids = [...state.selected]; if (!ids.length) { toast("No songs selected"); return; }
  if (!state.currentId) { playSong(ids[0], ids); exitSelectMode(); toast("Playing now"); return; }
  let insertAt = state.qIndex + 1;
  for (const id of ids) { state.queue.splice(insertAt, 0, id); insertAt++; }
  toast(`${ids.length} added to play next`);
  exitSelectMode();
}
function bulkAddQueue(){
  const ids = [...state.selected]; if (!ids.length) { toast("No songs selected"); return; }
  if (!state.currentId) { playSong(ids[0], ids); exitSelectMode(); toast("Playing now"); return; }
  state.queue.push(...ids);
  toast(`${ids.length} added to queue`);
  exitSelectMode();
}

// ---------- render: playlists (pin, folders, reorder) ----------
function playlistGroupSort(list){ return [...list].sort((a,b) => (a.order||0)-(b.order||0)); }
function pinnedPlaylists(){ return playlistGroupSort(state.playlists.filter((p) => p.pinned)); }
function folderPlaylists(fid){ return playlistGroupSort(state.playlists.filter((p) => !p.pinned && p.folderId === fid)); }
function ungroupedPlaylists(){ return playlistGroupSort(state.playlists.filter((p) => !p.pinned && !p.folderId)); }
function sortedFolders(){ return [...state.folders].sort((a,b) => (a.order||0)-(b.order||0)); }

function renderPlaylistsView(){
  const pinned = pinnedPlaylists();
  const folders = sortedFolders();
  const ungrouped = ungroupedPlaylists();
  let html = `<h1 class="wordmark">Playlists<span class="dot">.</span></h1>
    <div class="toolbar">
      <button class="btn primary" onclick="createPlaylist()"><span class="ic">${ic("plus")}</span>New playlist</button>
      <button class="btn" onclick="createFolder()"><span class="ic">${ic("folder")}</span>New folder</button>
      <button class="btn ${state.reorderMode ? "on" : ""}" onclick="toggleReorderMode()">${state.reorderMode ? "Done" : "Reorder"}</button>
    </div>`;
  if (!pinned.length && !folders.length && !ungrouped.length) {
    html += `<div class="empty"><span class="big">≣</span>No playlists yet.<br>Make one, then add songs from any song's ⋯ menu — or select several at once from the Library and tap +Playlist.</div>`;
  } else {
    if (pinned.length) html += `<div class="subhead">Pinned</div>` + pinned.map(playlistCardHTML).join("");
    for (const f of folders) {
      const items = folderPlaylists(f.id);
      const open = state.openFolders.has(f.id);
      html += `<div class="folder-head">
        <span onclick="toggleFolderOpen('${f.id}')" style="display:flex;align-items:center;gap:10px;flex:1">
          <span class="chev ${open ? "open" : ""}">${ic("chevron")}</span>
          <span class="fico">${ic("folder")}</span>
          <span class="t">${esc(f.name)}</span>
        </span>
        <span class="s">${items.length}</span>
        <button class="icon-btn" onclick="deleteFolder('${f.id}')" aria-label="Delete folder">${ic("trash")}</button>
      </div>`;
      if (open) html += items.length ? items.map(playlistCardHTML).join("") : `<div class="empty" style="padding:16px 20px">Empty folder — tap the folder icon on a playlist to move it here.</div>`;
    }
    if (ungrouped.length) html += (folders.length || pinned.length ? `<div class="subhead">Playlists</div>` : "") + ungrouped.map(playlistCardHTML).join("");
  }
  document.getElementById("main").innerHTML = html;
}
function playlistCardHTML(p){
  return `<div class="pl-card glass">
    ${state.reorderMode ? `<span class="reorder-arrows">
        <button onclick="movePlaylist('${p.id}',-1)" aria-label="Move up">${ic("up")}</button>
        <button onclick="movePlaylist('${p.id}',1)" aria-label="Move down">${ic("down")}</button>
      </span>` : ""}
    <span class="art" style="width:48px;height:48px;border-radius:12px;background:var(--glass-strong);display:flex;align-items:center;justify-content:center;color:var(--moon)" onclick="openPlaylist('${p.id}')">${ic("list")}</span>
    <div style="flex:1;min-width:0" onclick="openPlaylist('${p.id}')"><div class="t">${esc(p.name)}</div><div class="s">${p.songIds.length} song${p.songIds.length === 1 ? "" : "s"}</div></div>
    <button class="icon-btn ${p.pinned ? "on" : ""}" onclick="togglePin('${p.id}')" aria-label="Pin playlist">${p.pinned ? ic("pin") : ic("pinoutline")}</button>
    <button class="icon-btn" onclick="openFolderPicker('${p.id}')" aria-label="Move to folder">${ic("folder")}</button>
  </div>`;
}
function toggleReorderMode(){ state.reorderMode = !state.reorderMode; renderMain(); }
function toggleFolderOpen(id){ if (state.openFolders.has(id)) state.openFolders.delete(id); else state.openFolders.add(id); renderMain(); }
async function togglePin(id){
  const p = state.playlists.find((x) => x.id === id); if (!p) return;
  p.pinned = !p.pinned;
  if (p.pinned) p.order = Date.now();
  await putPlaylist(p); renderMain();
}
async function movePlaylist(id, dir){
  const p = state.playlists.find((x) => x.id === id); if (!p) return;
  const group = p.pinned ? pinnedPlaylists() : p.folderId ? folderPlaylists(p.folderId) : ungroupedPlaylists();
  const idx = group.findIndex((x) => x.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= group.length) return;
  const other = group[swapIdx];
  const tmp = p.order || 0; p.order = other.order || 0; other.order = tmp;
  await putPlaylist(p); await putPlaylist(other);
  renderMain();
}
async function createFolder(){
  const name = prompt("Folder name:"); if (!name) return null;
  const f = { id: uid(), name: name.trim(), order: Date.now() };
  state.folders.push(f); state.openFolders.add(f.id);
  await putFolder(f); renderMain(); return f;
}
async function deleteFolder(id){
  if (!confirm("Delete this folder? Playlists inside stay in your library, just ungrouped.")) return;
  for (const p of state.playlists) if (p.folderId === id) { p.folderId = null; await putPlaylist(p); }
  state.folders = state.folders.filter((f) => f.id !== id);
  await delFolder(id);
  renderMain();
}

    </div>` +
    state.folders.map((f) => `<div class="row" onclick="setPlaylistFolder('${f.id}')">
      <span class="art" style="width:44px;height:44px;color:var(--moon)">${ic("folder")}</span>
      <div class="meta"><div class="t">${esc(f.name)}</div></div>

    </div>`).join("");
  document.getElementById("backdrop").classList.add("open");
  document.getElementById("sheet-folderpick").classList.add("open");
}
async function setPlaylistFolder(fid){
  const p = state.playlists.find((x) => x.id === folderPickPid); if (!p) return;

async function createFolderThenAssign(){

// ---------- render: playlist detail ----------
function openPlaylist(id){ state.openPlaylistId = id; renderPlaylistDetail(); }
function renderPlaylistDetail(){
  const p = state.playlists.find((x) => x.id === state.openPlaylistId);
  if (!p) return showView("playlists");
  const songs = sortSongs(p.songIds.map(songById).filter(Boolean), p.sort || "custom");
  const selecting = state.selectMode && state.selectCtx === p.id;
  document.getElementById("main").innerHTML = `
    <div class="toolbar"><button class="btn" onclick="showView('playlists')">‹ Playlists</button>
      <button class="btn" onclick="renamePlaylist('${p.id}')">Rename</button>
      <button class="btn danger" onclick="removePlaylist('${p.id}')">Delete</button></div>
    <h1 class="wordmark" style="font-size:28px">${esc(p.name)}</h1>
    ${selecting ? `
      <div class="toolbar">
        <span class="subhead" style="margin:0">${state.selected.size} selected</span>
        <span style="flex:1"></span>
        <button class="btn" onclick="selectAllVisible()">All</button>
        <button class="btn" onclick="bulkAddToPlaylist()">+ Playlist</button>
        <button class="btn" onclick="bulkPlayNext()">Play next</button>
        <button class="btn danger" onclick="bulkRemoveFromPlaylist()">Remove</button>
        <button class="btn" onclick="exitSelectMode()">Done</button>
      </div>` : `
      <div class="toolbar">
        <span class="subhead" style="margin:0">${songs.length} song${songs.length === 1 ? "" : "s"}</span>
        <span style="flex:1"></span>
        <button class="btn primary" onclick="shufflePlaylist('${p.id}')"><span class="ic">${ic("shuffle")}</span>Shuffle play</button>
        <select class="sortsel" onchange="setPlaylistSort('${p.id}',this.value)">
          <option value="custom" ${(p.sort||"custom") === "custom" ? "selected" : ""}>My order</option>
          <option value="title" ${p.sort === "title" ? "selected" : ""}>A–Z (title)</option>
          <option value="artist" ${p.sort === "artist" ? "selected" : ""}>Artist</option>
          <option value="added" ${p.sort === "added" ? "selected" : ""}>Recently added</option>
        </select>
        <button class="btn" onclick="toggleSelectMode('${p.id}')">Select</button>
      </div>`}
    ${songs.length ? songs.map((s) => songRowHTML(s, p.id)).join("")
      : `<div class="empty">Empty playlist — add songs from a song's ⋯ menu, or select several in your Library and tap +Playlist.</div>`}`;
}
async function createPlaylist(){
  const name = prompt("Playlist name:"); if (!name) return null;
  const p = { id: uid(), name: name.trim(), songIds: [], sort: "custom", pinned: false, order: Date.now(), folderId: null };
  state.playlists.push(p); await putPlaylist(p); renderMain(); return p;
}
async function renamePlaylist(id){
  const p = state.playlists.find((x) => x.id === id); if (!p) return;
  const name = prompt("Rename playlist:", p.name); if (!name) return;
  p.name = name.trim(); await putPlaylist(p); renderPlaylistDetail();
}
async function removePlaylist(id){
  if (!confirm("Delete this playlist? Songs stay in your library.")) return;
  state.playlists = state.playlists.filter((p) => p.id !== id);
  await delPlaylist(id); showView("playlists");
}

// ---------- now playing UI ----------
function openNow(){ if (state.currentId) { document.getElementById("now").classList.add("open"); updateNowUI(); } }
function closeNow(){ document.getElementById("now").classList.remove("open"); closeLyrics(); }
function updatePlayIcons(){

  document.getElementById("mini-play").innerHTML = svg;
}
function updateNowUI(){

// ---------- lyrics (with optional line-by-line sync) ----------
function openLyrics(){ document.getElementById("lyrics-panel").classList.add("open"); renderLyrics(); }
function closeLyrics(){ document.getElementById("lyrics-panel").classList.remove("open"); if (syncState) cancelSync(); }
function toggleTranslation(){ state.showTrans = !state.showTrans; renderLyrics(); }
function renderLyrics(){
  if (syncState) return;
  const s = songById(state.currentId);
  const box = document.getElementById("lyrics-scroll");
  const tbtn = document.getElementById("btn-trans-toggle");
  if (!s) { box.innerHTML = ""; return; }
  const hasTrans = !!(s.trans && s.trans.trim());
  tbtn.style.display = hasTrans ? "" : "none";
  tbtn.textContent = state.showTrans ? "Hide translation" : "Show translation";
  if (!s.lyrics || !s.lyrics.trim()) {
    box.innerHTML = `<div class="lyr-hint">No lyrics saved for this song yet.<br><br>Tap <b>Edit ✎</b> up top, paste the lyrics (and a translation if you'd like), and they'll appear here — with each translated line under the original. You can even sync them line-by-line to play in time with the music.</div>`;
    return;
  }
  const lines = s.lyrics.split(/\r?\n/);
  const tlines = hasTrans ? s.trans.split(/\r?\n/) : [];
  const synced = s.syncTimes && s.syncTimes.length === lines.length;
  box.innerHTML = lines.map((line, i) => `
    <div class="lyr-pair ${synced ? "synced" : ""}" data-i="${i}" ${synced ? `onclick="seekToLyricLine(${i})"` : ""}>
      <div class="lyr-line">${esc(line) || "&nbsp;"}</div>
      ${hasTrans && state.showTrans && (tlines[i] || "").trim() ? `<div class="lyr-trans">${esc(tlines[i])}</div>` : ""}
    </div>`).join("");
  updateLyricHighlight();
}
function seekToLyricLine(i){
  const s = songById(state.currentId); if (!s || !s.syncTimes) return;
  audio.currentTime = s.syncTimes[i];
  if (audio.paused) audio.play();
}
function updateLyricHighlight(){
  if (syncState) return;
  const s = songById(state.currentId);
  if (!s || !s.syncTimes || !document.getElementById("lyrics-panel").classList.contains("open")) return;
  const lines = (s.lyrics || "").split(/\r?\n/);
  if (s.syncTimes.length !== lines.length) return;
  let active = -1;
  for (let i = 0; i < s.syncTimes.length; i++) { if (audio.currentTime >= s.syncTimes[i]) active = i; else break; }
  const box = document.getElementById("lyrics-scroll");
  if (!box) return;
  const pairs = box.querySelectorAll(".lyr-pair");
  pairs.forEach((el, i) => el.classList.toggle("active", i === active));
  if (active >= 0 && pairs[active]) pairs[active].scrollIntoView({ block: "center", behavior: "smooth" });
}

// ---------- lyric sync tool (tap-along, like a karaoke stopwatch) ----------
async function syncFromDetails(){
  await saveDetails();
  startSync(editingId);
}
function startSync(id){
  const s = songById(id); if (!s || !s.lyrics || !s.lyrics.trim()) { toast("Add lyrics first, then sync them"); return; }
  const lines = s.lyrics.split(/\r?\n/);
  syncState = { songId: id, lines, times: [], index: 0 };
  closeAllSheets();
  if (state.currentId !== id) { playSong(id, [id]); } else { audio.currentTime = 0; if (audio.paused) audio.play(); }
  openNow(); openLyrics();
  renderSyncUI();
}
function renderSyncUI(){
  const box = document.getElementById("lyrics-scroll");
  if (!syncState) return;
  const { lines, index } = syncState;
  box.innerHTML = `
    <div class="sync-box">
      <div class="sync-progress">Line ${index+1} of ${lines.length}</div>
      <div class="sync-prev">${index>0 ? esc(lines[index-1]) : ""}</div>
      <div class="sync-current">${esc(lines[index]) || "♪ (instrumental) ♪"}</div>
      <div class="sync-next">${index<lines.length-1 ? esc(lines[index+1]) : ""}</div>
      <button class="btn primary sync-tap" onclick="tapSyncLine()">Tap in time ⏱</button>
      <div class="toolbar" style="justify-content:center;margin-top:14px">
        <button class="btn" onclick="undoSyncLine()">Undo last</button>
        <button class="btn danger" onclick="cancelSync()">Cancel sync</button>
      </div>
    </div>`;
}
function tapSyncLine(){
  if (!syncState) return;
  syncState.times.push(audio.currentTime);
  syncState.index++;
  if (syncState.index >= syncState.lines.length) { finishSync(); return; }
  renderSyncUI();
}
function undoSyncLine(){
  if (!syncState || !syncState.times.length) return;
  syncState.times.pop(); syncState.index = Math.max(0, syncState.index - 1);
  renderSyncUI();
}
async function finishSync(){
  const s = songById(syncState.songId);
  if (s) { s.syncTimes = syncState.times; await putSong(s); }
  toast("Lyrics synced ✓");
  syncState = null;
  renderLyrics();
}
function cancelSync(){
  syncState = null;
  toast("Sync cancelled");
  renderLyrics();
}

// ---------- song details sheet ----------
function openDetails(id){
  editingId = id;
  pendingSyncTimes = null;
  const s = songById(id); if (!s) return;
  document.getElementById("ed-title").value = s.title;
  document.getElementById("ed-year").value = s.year || "";
  document.getElementById("ed-artist").value = s.artist;
  document.getElementById("ed-album").value = s.album || "";
  document.getElementById("ed-lyrics").value = s.lyrics || "";
  document.getElementById("ed-trans").value = s.trans || "";
  const art = artURL(s);
  document.getElementById("ed-art-slot").innerHTML = art ? `<img src="${art}" alt="">` : `<span class="noart">♪</span>`;
  document.getElementById("backdrop").classList.add("open");
  document.getElementById("sheet-details").classList.add("open");
}
function openDetailsForCurrent(){ if (state.currentId) { closeNow(); openDetails(state.currentId); } }
document.getElementById("art-input").addEventListener("change", async (e) => {
  const f = e.target.files[0]; if (!f || !editingId) return;
  const s = songById(editingId);
  s.artBlob = f;
  if (artURLCache.has(s.id)) { URL.revokeObjectURL(artURLCache.get(s.id)); artURLCache.delete(s.id); }
  await putSong(s);
  document.getElementById("ed-art-slot").innerHTML = `<img src="${artURL(s)}" alt="">`;
  updateNowUI(); renderMain(); toast("Cover updated");
  e.target.value = "";
});
async function saveDetails(){
  const s = songById(editingId); if (!s) return;
  const newLyrics = document.getElementById("ed-lyrics").value;
  const newLines = newLyrics.split(/\r?\n/);
  if (pendingSyncTimes && pendingSyncTimes.length === newLines.length) {
    s.syncTimes = pendingSyncTimes;
  } else if (s.syncTimes && newLyrics !== s.lyrics) {
    s.syncTimes = null;
  }
  pendingSyncTimes = null;
  s.title = document.getElementById("ed-title").value.trim() || "Untitled";
  s.year = document.getElementById("ed-year").value.trim().replace(/[^\d]/g, "").slice(0, 4);
  s.artist = document.getElementById("ed-artist").value.trim() || "Unknown artist";
  s.album = document.getElementById("ed-album").value.trim();
  s.lyrics = newLyrics;
  s.trans = document.getElementById("ed-trans").value;
  await putSong(s);
  closeAllSheets(); renderMain(); updateNowUI(); toast("Saved");
}
async function deleteSong(){
  if (!editingId || !confirm("Delete this song from Moonside?")) return;
  const id = editingId;
  state.songs = state.songs.filter((s) => s.id !== id);
  for (const p of state.playlists) {
    if (p.songIds.includes(id)) { p.songIds = p.songIds.filter((x) => x !== id); await putPlaylist(p); }
  }
  await delSongRec(id); await delBlob(id);
  if (state.currentId === id) { audio.pause(); state.currentId = null; document.getElementById("mini").classList.remove("show"); closeNow(); }
  closeAllSheets(); renderMain(); toast("Song deleted");
}

// ---------- add to playlist (single or multiple songs at once) ----------
function openAddToPlaylist(idOrIds){
  pickIds = Array.isArray(idOrIds) ? idOrIds : [idOrIds];
  if (!pickIds.length) return;

async function addToPlaylist(pid){
  const p = state.playlists.find((x) => x.id === pid); if (!p || !pickIds.length) return;
  let added = 0;
  for (const id of pickIds) if (!p.songIds.includes(id)) { p.songIds.push(id); added++; }

  toast(added ? `${added} added to ${p.name}` : `Already in ${p.name}`);

  if (state.selectMode) exitSelectMode();
  if (state.view === "playlists") renderMain();
}
async function newPlaylistThenAdd(){
  const p = await createPlaylist();
  if (p && pickIds.length) {
    for (const id of pickIds) if (!p.songIds.includes(id)) p.songIds.push(id);
    await putPlaylist(p);

  closeAllSheets();
  if (state.selectMode) exitSelectMode();

function closeAllSheets(){
  document.getElementById("backdrop").classList.remove("open");

}

// ---------- backup & restore ----------
// Backs up lyrics, translations, sync timing, custom artwork, playlist
// organisation (including pins and folders) — the things that took effort
// and live only on this device. Audio isn't included, since that would make
// backups huge; re-import it from your drive, then Restore to reattach
// everything else by matching each song's title + artist.
async function createBackup(){
  if (!window.JSZip) { toast("Still loading the backup tool — try again in a second"); return; }
  if (!state.songs.length) { toast("Your library is empty — nothing to back up yet"); return; }
  toast("Preparing backup…");
  try {
    const zip = new JSZip();
    const manifest = { version: 2, exportedAt: new Date().toISOString(), songs: [], playlists: [], folders: [] };
    let artIndex = 0;
    for (const s of state.songs) {
      const entry = {
        key: matchKey(s.title, s.artist),
        title: s.title, artist: s.artist, album: s.album || "", year: s.year || "",
        lyrics: s.lyrics || "", trans: s.trans || "",
        syncTimes: (s.syncTimes && s.syncTimes.length) ? s.syncTimes : null,
        art: null
      };
      if (s.artBlob) {
        const path = `art/img_${artIndex++}.${mimeToExt(s.artBlob.type)}`;
        zip.file(path, s.artBlob);
        entry.art = path;
      }
      manifest.songs.push(entry);
    }
    for (const f of state.folders) manifest.folders.push({ name: f.name, order: f.order || 0 });
    for (const p of state.playlists) {
      manifest.playlists.push({
        name: p.name, sort: p.sort || "custom", pinned: !!p.pinned, order: p.order || 0,
        folder: p.folderId ? (state.folders.find((f) => f.id === p.folderId)?.name || null) : null,
        songKeys: p.songIds.map((id) => { const s = songById(id); return s ? matchKey(s.title, s.artist) : null; }).filter(Boolean)
      });
    }
    zip.file("manifest.json", JSON.stringify(manifest, null, 2));
    const blob = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `moonside-backup-${new Date().toISOString().slice(0,10)}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast(`Backup ready — ${state.songs.length} songs, ${state.playlists.length} playlists`);
  } catch (e) {
    console.error(e);
    toast("Backup failed — please try again");
  }
}
async function restoreBackupFile(file){
  if (!file) return;
  if (!window.JSZip) { toast("Still loading the backup tool — try again in a second"); return; }
  toast("Reading backup…");
  try {
    const zip = await JSZip.loadAsync(file);
    const manifestEntry = zip.file("manifest.json");
    if (!manifestEntry) { toast("That doesn't look like a Moonside backup"); return; }
    const manifest = JSON.parse(await manifestEntry.async("string"));
    const byKey = new Map();
    for (const s of state.songs) { const k = matchKey(s.title, s.artist); if (!byKey.has(k)) byKey.set(k, s); }

    let filled = 0, missing = 0;
    for (const entry of manifest.songs || []) {
      const s = byKey.get(entry.key);
      if (!s) { missing++; continue; }
      let changed = false;
      if (!s.lyrics && entry.lyrics) { s.lyrics = entry.lyrics; changed = true; }
      if (!s.trans && entry.trans) { s.trans = entry.trans; changed = true; }
      if (!s.year && entry.year) { s.year = entry.year; changed = true; }
      if ((!s.syncTimes || !s.syncTimes.length) && entry.syncTimes && entry.syncTimes.length) { s.syncTimes = entry.syncTimes; changed = true; }
      if (!s.artBlob && entry.art && zip.file(entry.art)) { s.artBlob = await zip.file(entry.art).async("blob"); changed = true; }
      if (changed) { await putSong(s); filled++; }
    }

    const folderByName = new Map();
    for (const f of manifest.folders || []) {
      let existing = state.folders.find((x) => x.name === f.name);
      if (!existing) { existing = { id: uid(), name: f.name, order: f.order || Date.now() }; state.folders.push(existing); await putFolder(existing); }
      folderByName.set(f.name, existing.id);
    }

    let playlistsTouched = 0;
    for (const pl of manifest.playlists || []) {
      let p = state.playlists.find((x) => x.name === pl.name);
      if (!p) { p = { id: uid(), name: pl.name, songIds: [], sort: pl.sort || "custom", pinned: false, order: Date.now(), folderId: null }; state.playlists.push(p); }
      p.pinned = !!pl.pinned;
      if (pl.order != null) p.order = pl.order;
      if (pl.folder) p.folderId = folderByName.get(pl.folder) || p.folderId || null;
      for (const k of pl.songKeys || []) {
        const s = byKey.get(k);
        if (s && !p.songIds.includes(s.id)) p.songIds.push(s.id);
      }
      await putPlaylist(p);
      playlistsTouched++;
    }
    render();
    let msg = `Restored ${filled} song${filled === 1 ? "" : "s"}, ${playlistsTouched} playlist${playlistsTouched === 1 ? "" : "s"}`;
    if (missing) msg += ` — ${missing} not found yet, import them first`;
    toast(msg);
  } catch (e) {
    console.error(e);
    toast("Couldn't read that backup file");
  }
}
document.getElementById("backup-input").addEventListener("change", (e) => {
  restoreBackupFile(e.target.files[0]); e.target.value = "";
});

// ---------- boot ----------
(async function init(){
  initStaticIcons();
  db = await openDB();
  state.songs = await getAll("songs");
  state.playlists = await getAll("playlists");
  state.folders = await getAll("folders");
  state.folders.forEach((f) => state.openFolders.add(f.id));
  render();
  if (navigator.storage && navigator.storage.persist) {
    try { await navigator.storage.persist(); } catch {}
  }
  if ("serviceWorker" in navigator) {
    try { await navigator.serviceWorker.register("sw.js"); } catch (e) { console.warn(e); }
  }
})();
</script>
